services:
  api:
    image: qniranjan01/authengine:${AUTHENGINE_IMAGE_TAG:-1.0.0}
    container_name: authengine-api
    ports:
      - "8000:8000"
    env_file:
      - ${ENV_FILE:-/opt/authengine/.env}
    volumes:
      - ${OIDC_PRIVATE_KEY_PATH:-/opt/authengine/oidc_private.pem}:/app/oidc_private.pem:ro
    restart: unless-stopped

  frontend:
    image: qniranjan01/authengine-dashboard:${AUTHENGINE_FRONTEND_IMAGE_TAG:-1.0.0}
    container_name: authengine-dashboard
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
