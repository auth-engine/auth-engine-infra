services:
  api:
    image: ${AUTHENGINE_IMAGE:-qniranjan01/authengine:latest}
    container_name: authengine-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - ${ENV_FILE:-/opt/authengine/.env}
    volumes:
      - ${OIDC_PRIVATE_KEY_PATH:-/opt/authengine/oidc_private.pem}:/app/oidc_private.pem:ro
    restart: unless-stopped

  frontend:
    image: ${AUTHENGINE_DASHBOARD_IMAGE:-qniranjan01/authengine-dashboard:latest}
    container_name: authengine-dashboard
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      - api
    env_file:
      - ${ENV_FILE:-/opt/authengine/.env}
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${DASHBOARD_PORT:-3000}
      HOSTNAME: ${HOSTNAME:-0.0.0.0}
    restart: unless-stopped
